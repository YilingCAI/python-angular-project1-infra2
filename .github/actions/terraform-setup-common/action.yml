name: Terraform Common Setup

description: Shared Terraform setup, AWS auth, backend render, init/validate, and optional security checks.

inputs:
  target_environment:
    description: Terraform target environment (dev/staging/prod)
    required: true
  operation:
    description: Terraform operation (plan/drift/apply)
    required: true
  aws_region:
    description: AWS region used for auth and backend config
    required: false
    default: us-east-1
  terraform_state_bucket:
    description: Terraform state bucket name
    required: false
    default: ""
  terraform_plan_speculative:
    description: Run Terraform in speculative mode (true disables remote backend init)
    required: false
    default: "false"
  aws_auth_required:
    description: Whether AWS OIDC authentication is required for this run
    required: false
    default: "true"
  jwt_secret_key:
    description: JWT secret injected as TF_VAR_jwt_secret_key
    required: true
  enable_security_checks:
    description: Run fmt/checkov/tflint/trivy checks
    required: false
    default: "false"
  checkov_enforcement:
    description: "Checkov enforcement mode: advisory (soft-fail) or blocking"
    required: false
    default: "advisory"
  aws_oidc_role_arn:
    description: OIDC role ARN used for all operations
    required: false
    default: ""
  role_session_name_prefix:
    description: Prefix for AWS role session name
    required: false
    default: gha-terraform

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.10.5
        terraform_wrapper: false

    - name: Configure Terraform cache
      shell: bash
      run: |
        mkdir -p "$HOME/.terraform.d/plugin-cache"
        echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> "$GITHUB_ENV"

    - name: Restore Terraform plugin cache
      uses: actions/cache@v4
      with:
        path: ~/.terraform.d/plugin-cache
        key: ${{ runner.os }}-terraform-${{ inputs.target_environment }}-${{ hashFiles(format('environments/{0}/.terraform.lock.hcl', inputs.target_environment)) }}
        restore-keys: |
          ${{ runner.os }}-terraform-${{ inputs.target_environment }}-
          ${{ runner.os }}-terraform-

    - name: Prepare speculative backend override
      if: ${{ inputs.terraform_plan_speculative == 'true' }}
      shell: bash
      run: |
        ENV_DIR="environments/${{ inputs.target_environment }}"
        rm -f "${ENV_DIR}/backend.hcl"
        rm -rf "${ENV_DIR}/.terraform/"
        cat > "${ENV_DIR}/_backend_override.tf" <<'EOF'
        terraform {
          backend "local" {
            path = "/tmp/speculative.tfstate"
          }
        }
        EOF
        
    - name: Resolve AWS role ARN
      if: ${{ inputs.aws_auth_required == 'true' }}
      id: role
      shell: bash
      env:
        OPERATION: ${{ inputs.operation }}
        AWS_OIDC_ROLE_ARN: ${{ inputs.aws_oidc_role_arn }}
      run: |
        ROLE_ARN="${AWS_OIDC_ROLE_ARN:-}"

        if [ -z "$ROLE_ARN" ]; then
          echo "Missing AWS_OIDC_ROLE_ARN secret for operation '$OPERATION'." >&2
          exit 1
        fi

        if ! printf '%s' "$ROLE_ARN" | grep -Eq '^arn:aws:iam::[0-9]{12}:role/.+'; then
          echo "Configured role ARN is invalid. Ensure the secret value is a full IAM role ARN like arn:aws:iam::123456789012:role/GitHubActionsRole." >&2
          exit 1
        fi

        echo "role_arn=$ROLE_ARN" >> "$GITHUB_OUTPUT"

    - name: Configure AWS credentials
      if: ${{ inputs.aws_auth_required == 'true' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ steps.role.outputs.role_arn }}
        aws-region: ${{ inputs.aws_region }}
        role-session-name: ${{ inputs.role_session_name_prefix }}-${{ inputs.target_environment }}-${{ github.run_id }}
        audience: sts.amazonaws.com
        unset-current-credentials: true

    - name: Verify assumed role identity
      if: ${{ inputs.aws_auth_required == 'true' }}
      shell: bash
      env:
        EXPECTED_ROLE_ARN: ${{ steps.role.outputs.role_arn }}
      run: |
        EXPECTED_ROLE_NAME="${EXPECTED_ROLE_ARN##*/}"
        MAX_ATTEMPTS=3
        RETRY_DELAY_SECONDS=5
        ACTUAL_ARN=""

        for ATTEMPT in $(seq 1 "$MAX_ATTEMPTS"); do
          if ACTUAL_ARN=$(aws sts get-caller-identity \
            --query Arn \
            --output text \
            --cli-connect-timeout 5 \
            --cli-read-timeout 10 2>/dev/null); then
            if printf '%s' "$ACTUAL_ARN" | grep -Eq ":assumed-role/${EXPECTED_ROLE_NAME}/"; then
              echo "Verified assumed role on attempt ${ATTEMPT}/${MAX_ATTEMPTS}: ${ACTUAL_ARN}"
              exit 0
            fi
          fi

          if [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; then
            echo "Assumed role not ready yet (attempt ${ATTEMPT}/${MAX_ATTEMPTS}). Retrying in ${RETRY_DELAY_SECONDS}s..."
            sleep "$RETRY_DELAY_SECONDS"
          fi
        done

        echo "OIDC role assumption mismatch after ${MAX_ATTEMPTS} attempts. Expected assumed role '${EXPECTED_ROLE_NAME}' from '${EXPECTED_ROLE_ARN}', got '${ACTUAL_ARN}'." >&2
        exit 1

    - name: Export sensitive Terraform vars
      shell: bash
      run: echo "TF_VAR_jwt_secret_key=${{ inputs.jwt_secret_key }}" >> "$GITHUB_ENV"

    - name: Ensure kubeconfig exists for providers
      shell: bash
      run: |
        # The Kubernetes and Helm providers need a resolvable kubeconfig at init time.
        # In CI the EKS cluster is not yet available during plan, so we write a dummy
        # stub at the standard path. If a real kubeconfig already exists, skip.
        KUBECONFIG_PATH="$HOME/.kube/config"
        ENV_DIR="environments/${{ inputs.target_environment }}"

        KUBECONFIG_CONTEXT=$(awk -F '=' '/^kubeconfig_context[[:space:]]*=/{gsub(/"/, "", $2); gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2}' \
          "${ENV_DIR}/terraform.tfvars" 2>/dev/null | tail -n 1)
        KUBECONFIG_CONTEXT="${KUBECONFIG_CONTEXT:-ci-context}"

        mkdir -p "$(dirname "$KUBECONFIG_PATH")"

        if [ ! -f "$KUBECONFIG_PATH" ]; then
          cat > "$KUBECONFIG_PATH" <<EOF
        apiVersion: v1
        kind: Config
        clusters:
        - name: ci-cluster
          cluster:
            server: https://127.0.0.1
            insecure-skip-tls-verify: true
        contexts:
        - name: ${KUBECONFIG_CONTEXT}
          context:
            cluster: ci-cluster
            user: ci-user
        current-context: ${KUBECONFIG_CONTEXT}
        users:
        - name: ci-user
          user:
            token: ci-token
        EOF
        fi

    - name: Render backend config
      if: ${{ inputs.terraform_plan_speculative != 'true' }}
      shell: bash
      run: |
        if [ -z "${{ inputs.terraform_state_bucket }}" ]; then
          echo "TERRAFORM_STATE_BUCKET is required when terraform_plan_speculative=false." >&2
          exit 1
        fi

        cat > environments/${{ inputs.target_environment }}/backend.hcl <<EOF
        bucket         = "${{ inputs.terraform_state_bucket }}"
        region         = "${{ inputs.aws_region }}"
        use_lockfile   = true
        encrypt        = true
        EOF

    - name: Terraform fmt
      if: ${{ inputs.enable_security_checks == 'true' }}
      shell: bash
      run: terraform -chdir="environments/${{ inputs.target_environment }}" fmt -check -recursive

    - name: Terraform init (backend)
      if: ${{ inputs.terraform_plan_speculative != 'true' }}
      shell: bash
      run: |
        terraform -chdir="environments/${{ inputs.target_environment }}" init \
          -backend-config=backend.hcl \
          -backend-config="key=${{ inputs.target_environment }}/terraform.tfstate" \
          -reconfigure \
          -input=false

    - name: Terraform init (speculative – local backend override)
      if: ${{ inputs.terraform_plan_speculative == 'true' }}
      shell: bash
      run: |
        terraform -chdir="environments/${{ inputs.target_environment }}" init \
          -reconfigure \
          -input=false

    - name: Terraform validate
      shell: bash
      run: terraform -chdir="environments/${{ inputs.target_environment }}" validate

    - name: Run Checkov scan
      if: ${{ inputs.enable_security_checks == 'true' }}
      shell: bash
      continue-on-error: ${{ inputs.checkov_enforcement == 'advisory' }}
      run: |
        pip3 install --quiet checkov
        checkov \
          --directory "environments/${{ inputs.target_environment }}" \
          --framework terraform \
          --quiet

    - name: Setup TFLint
      if: ${{ inputs.enable_security_checks == 'true' }}
      uses: terraform-linters/setup-tflint@v4
      with:
        tflint_version: v0.55.1

    - name: Restore TFLint plugin cache
      if: ${{ inputs.enable_security_checks == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.tflint.d/plugins
        key: ${{ runner.os }}-tflint-${{ inputs.target_environment }}-${{ hashFiles(format('environments/{0}/.terraform.lock.hcl', inputs.target_environment)) }}
        restore-keys: |
          ${{ runner.os }}-tflint-${{ inputs.target_environment }}-
          ${{ runner.os }}-tflint-

    - name: Run TFLint
      if: ${{ inputs.enable_security_checks == 'true' }}
      shell: bash
      run: |
        tflint --chdir="environments/${{ inputs.target_environment }}" --init
        tflint --chdir="environments/${{ inputs.target_environment }}" --format compact

    - name: Dependency vulnerability scan
      if: ${{ inputs.enable_security_checks == 'true' }}
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        scan-type: fs
        scan-ref: .
        scanners: vuln
        severity: HIGH,CRITICAL
        ignore-unfixed: true
        format: table
