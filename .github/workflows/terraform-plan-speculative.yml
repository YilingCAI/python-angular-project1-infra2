name: Terraform Plan Speculative

# Speculative plans run on pull requests and pushes to main (Terraform-related changes).
# These plans use a local backend override (no state writes) and post rich PR comments.
# Security and cost checks are enabled; Infracost estimates are included when available.
#
# Promotion order: dev → staging → prod (each waits for the prior to succeed).

on:
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/.terraform.lock.hcl'
      - '!bootstrap/**'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options: [dev, staging, prod, all]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: terraform-speculative-${{ github.event.inputs.environment || 'all' }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan-dev:
    name: Speculative Plan [dev]
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' &&
        (inputs.environment == 'dev' || inputs.environment == 'all'))
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: dev
      speculative: true
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: true
      enable_infracost: true
    secrets: inherit

  plan-staging:
    name: Speculative Plan [staging]
    needs: [plan-dev]
    if: >-
      needs.plan-dev.result == 'success' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.environment == 'staging' || inputs.environment == 'all'))
      )
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: staging
      speculative: true
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
      enable_infracost: true
    secrets: inherit

  plan-prod:
    name: Speculative Plan [prod]
    needs: [plan-staging]
    if: >-
      needs.plan-staging.result == 'success' &&
      (
        github.event_name == 'push' ||
        github.event_name == 'pull_request' ||
        (github.event_name == 'workflow_dispatch' &&
          (inputs.environment == 'prod' || inputs.environment == 'all'))
      )
    uses: ./.github/workflows/terraform-plan-reusable.yml
    with:
      target_environment: prod
      speculative: true
      enable_security_checks: true
      checkov_enforcement: advisory
      enable_pr_comment: false
      enable_infracost: true
    secrets: inherit