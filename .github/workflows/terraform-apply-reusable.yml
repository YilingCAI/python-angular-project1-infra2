name: Terraform Apply Reusable

# Focused single-responsibility apply workflow:
#   1. Initialize Terraform/AWS context for this isolated job
#   2. Verify no drift exists at apply time
#   3. Download and apply the saved plan artifact from terraform-plan-reusable.yml
#   4. Write a job summary with rollback metadata

on:
  workflow_call:
    inputs:
      target_environment:
        description: Terraform target environment (dev/staging/prod)
        required: true
        type: string
      github_environment:
        description: GitHub Environment name override (falls back to target_environment)
        required: false
        type: string
        default: ""
      saved_plan_artifact_name:
        description: Name of the artifact that contains tfplan.binary (produced by terraform-plan-reusable.yml)
        required: true
        type: string
      saved_plan_artifact_id:
        description: Exact artifact ID to download (preferred; avoids name collisions on reruns)
        required: false
        type: string
        default: ""
      fail_on_drift:
        description: Fail apply when drift is detected immediately before apply
        required: false
        type: boolean
        default: true
    secrets:
      JWT_SECRET_KEY:
        required: true
      TERRAFORM_STATE_BUCKET:
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-apply:
    name: "Apply [${{ inputs.target_environment }}]"
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-state-${{ inputs.target_environment }}
      cancel-in-progress: false
    environment: ${{ inputs.github_environment != '' && inputs.github_environment || inputs.target_environment }}
    env:
      TF_ENV: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Terraform common setup
        uses: ./.github/actions/terraform-setup-common
        with:
          target_environment: ${{ inputs.target_environment }}
          operation: apply
          aws_region: ${{ vars.AWS_REGION }}
          terraform_state_bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
          terraform_plan_speculative: false
          aws_auth_required: true
          jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
          enable_security_checks: false
          checkov_enforcement: advisory
          aws_oidc_role_arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role_session_name_prefix: gha-terraform-apply

      - name: Detect Terraform var-file
        id: vars
        shell: bash
        run: |
          if [ -f "environments/${TF_ENV}/terraform.tfvars" ]; then
            echo "var_file_arg=-var-file=terraform.tfvars" >> "$GITHUB_OUTPUT"
          else
            echo "var_file_arg=" >> "$GITHUB_OUTPUT"
            echo "terraform.tfvars not found in environments/${TF_ENV}; running with defaults and other provided vars."
          fi

      - name: Capture current remote state version
        id: state_version
        shell: bash
        run: |
          STATE_KEY="${TF_ENV}/terraform.tfstate"
          BUCKET="${{ secrets.TERRAFORM_STATE_BUCKET }}"

          if ! aws s3api head-object --bucket "${BUCKET}" --key "${STATE_KEY}" >/dev/null 2>&1; then
            echo "state_exists=false" >> "$GITHUB_OUTPUT"
            echo "version_id=none" >> "$GITHUB_OUTPUT"
            echo "No remote state object found for ${STATE_KEY}. Treating this as first deployment."
            exit 0
          fi

          echo "state_exists=true" >> "$GITHUB_OUTPUT"
          VERSION_ID=$(aws s3api list-object-versions \
            --bucket "${BUCKET}" \
            --prefix "${STATE_KEY}" \
            --query "Versions[?IsLatest && Key=='${STATE_KEY}'].VersionId | [0]" \
            --output text)

          if [ -z "${VERSION_ID}" ] || [ "${VERSION_ID}" = "None" ]; then
            echo "version_id=unknown" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not resolve latest S3 state version for ${STATE_KEY}."
          else
            echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
            echo "Resolved pre-apply state version: ${VERSION_ID}"
          fi

      - name: Drift detection before apply
        id: drift
        shell: bash
        run: |
          PLAN_FILE="environments/${TF_ENV}/drift-pre-apply.txt"
          PLAN_EXIT=0

          if [ "${{ steps.state_version.outputs.state_exists }}" != "true" ]; then
            echo "No remote state exists yet; skipping drift detection for initial deployment." | tee "${PLAN_FILE}"
            echo "drift_exit=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          terraform -chdir="environments/${TF_ENV}" plan \
            -refresh-only \
            -detailed-exitcode \
            ${{ steps.vars.outputs.var_file_arg }} \
            -lock-timeout=5m \
            -no-color > "${PLAN_FILE}" 2>&1 || PLAN_EXIT=$?

          cat "${PLAN_FILE}"
          echo "drift_exit=${PLAN_EXIT}" >> "$GITHUB_OUTPUT"

          if [ "${PLAN_EXIT}" -eq 1 ]; then
            echo "::error::Terraform drift check errored before apply in ${TF_ENV}."
            exit 1
          fi

      - name: Upload pre-apply drift artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: terraform-drift-pre-apply-${{ inputs.target_environment }}
          path: environments/${{ inputs.target_environment }}/drift-pre-apply.txt
          retention-days: 14

      - name: Stop apply when drift exists
        if: ${{ inputs.target_environment != 'dev' && inputs.fail_on_drift && steps.drift.outputs.drift_exit == '2' }}
        shell: bash
        run: |
          echo "::error::Drift detected in ${TF_ENV}. Aborting apply to protect promotion integrity."
          exit 1

      # ── Download saved plan artifact ──────────────────────────────────────────
      - name: Download saved plan artifact (by ID)
        if: ${{ inputs.saved_plan_artifact_id != '' }}
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ inputs.saved_plan_artifact_id }}
          merge-multiple: true
          path: environments/${{ inputs.target_environment }}

      - name: Download saved plan artifact (by name fallback)
        if: ${{ inputs.saved_plan_artifact_id == '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.saved_plan_artifact_name }}
          path: environments/${{ inputs.target_environment }}

      - name: Load saved plan metadata
        id: plan_meta
        shell: bash
        run: |
          META_FILE="environments/${TF_ENV}/plan-metadata.env"
          if [ ! -f "${META_FILE}" ]; then
            echo "metadata_present=false" >> "$GITHUB_OUTPUT"
            echo "plan_state_version=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PLAN_STATE_VERSION=$(awk -F '=' '/^PLAN_STATE_VERSION=/{print $2}' "${META_FILE}" | tail -n 1)
          if [ -z "${PLAN_STATE_VERSION}" ]; then
            PLAN_STATE_VERSION="unknown"
          fi

          echo "metadata_present=true" >> "$GITHUB_OUTPUT"
          echo "plan_state_version=${PLAN_STATE_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Classify stale saved plan
        id: plan_freshness
        shell: bash
        run: |
          STALE=false
          PLAN_STATE="${{ steps.plan_meta.outputs.plan_state_version }}"
          CURRENT_STATE="${{ steps.state_version.outputs.version_id }}"

          if [ "${{ steps.state_version.outputs.state_exists }}" = "true" ] \
            && [ "${PLAN_STATE}" != "unknown" ] \
            && [ "${PLAN_STATE}" != "none" ] \
            && [ "${CURRENT_STATE}" != "unknown" ] \
            && [ "${CURRENT_STATE}" != "none" ] \
            && [ "${PLAN_STATE}" != "${CURRENT_STATE}" ]; then
            STALE=true
          fi

          echo "stale=${STALE}" >> "$GITHUB_OUTPUT"

      # ── Taint detection ───────────────────────────────────────────────────────
      # Read the saved plan binary (already downloaded) and identify any resources
      # whose action_reason is "replace_because_tainted". These require untaint
      # before applying — otherwise Terraform will destroy a live resource.
      - name: Detect tainted resources in saved plan
        id: taint_check
        shell: bash
        run: |
          PLAN_BINARY="environments/${TF_ENV}/tfplan.binary"
          if [ ! -f "${PLAN_BINARY}" ]; then
            echo "has_tainted=false" >> "$GITHUB_OUTPUT"
            echo "tainted_list=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAINTED=$(terraform -chdir="environments/${TF_ENV}" show -json tfplan.binary 2>/dev/null \
            | jq -r '[.resource_changes[]
                | select(.action_reason == "replace_because_tainted")
                | .address] | join(" ")' 2>/dev/null || echo "")

          if [ -n "${TAINTED}" ]; then
            echo "::warning::Tainted resources found in saved plan: ${TAINTED}"
            echo "has_tainted=true" >> "$GITHUB_OUTPUT"
            echo "tainted_list=${TAINTED}" >> "$GITHUB_OUTPUT"
          else
            echo "has_tainted=false" >> "$GITHUB_OUTPUT"
            echo "tainted_list=" >> "$GITHUB_OUTPUT"
          fi

      # ── Staging/prod gate: block on stale plan OR tainted resources ───────────
      - name: Block apply — stale plan or tainted resources (staging/prod)
        if: >-
          ${{ inputs.target_environment != 'dev' &&
              (steps.plan_freshness.outputs.stale == 'true' ||
               steps.taint_check.outputs.has_tainted == 'true') }}
        shell: bash
        run: |
          if [ "${{ steps.plan_freshness.outputs.stale }}" == "true" ]; then
            echo "::error::Saved plan is stale for ${TF_ENV}."
            echo "::error::  Plan state version   : ${{ steps.plan_meta.outputs.plan_state_version }}"
            echo "::error::  Current state version: ${{ steps.state_version.outputs.version_id }}"
            echo "::error::Action: re-run the plan workflow, obtain a new approval, then apply."
          fi
          if [ "${{ steps.taint_check.outputs.has_tainted }}" == "true" ]; then
            echo "::error::Tainted resources found in saved plan for ${TF_ENV}."
            echo "::error::Applying this plan would destroy and recreate:"
            for addr in ${{ steps.taint_check.outputs.tainted_list }}; do
              echo "::error::  - ${addr}"
            done
            echo "::error::Action: trigger the 'Terraform Untaint' workflow_dispatch for ${TF_ENV},"
            echo "::error::specifying the resource addresses above, then re-run the plan + apply."
          fi
          exit 1

      # ── Dev auto-fix: untaint + rebuild plan when stale or tainted ────────────
      - name: Auto-fix in dev — untaint and rebuild plan
        if: >-
          ${{ inputs.target_environment == 'dev' &&
              (steps.plan_freshness.outputs.stale == 'true' ||
               steps.taint_check.outputs.has_tainted == 'true') }}
        shell: bash
        run: |
          if [ "${{ steps.taint_check.outputs.has_tainted }}" == "true" ]; then
            echo "::warning::Auto-untainting tainted resources in dev before apply."
            for addr in ${{ steps.taint_check.outputs.tainted_list }}; do
              echo "  Untainting: ${addr}"
              terraform -chdir="environments/${TF_ENV}" untaint "${addr}"
            done
          fi

          if [ "${{ steps.plan_freshness.outputs.stale }}" == "true" ]; then
            echo "::warning::Saved plan is stale in dev — rebuilding against current state."
          fi

          echo "Regenerating plan..."
          terraform -chdir="environments/${TF_ENV}" plan \
            ${{ steps.vars.outputs.var_file_arg }} \
            -lock-timeout=5m \
            -out="tfplan.binary" \
            -no-color 2>&1 | tee "environments/${TF_ENV}/plan-output-dev-rebuilt.txt"

      - name: Verify saved plan file exists
        shell: bash
        run: |
          [ -f "environments/${TF_ENV}/tfplan.binary" ] || {
            echo "::error::Saved plan file not found at environments/${TF_ENV}/tfplan.binary" >&2
            exit 1
          }

      # ── Apply ─────────────────────────────────────────────────────────────────
      - name: Terraform apply
        if: ${{ steps.drift.outputs.drift_exit != '1' }}
        shell: bash
        run: |
          terraform -chdir="environments/${TF_ENV}" apply \
            -lock-timeout=5m \
            -auto-approve \
            -input=false \
            "tfplan.binary"

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Workflow summary
        if: always()
        shell: bash
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            echo "## Terraform Apply Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Environment** | \`${TF_ENV}\` |"
            echo "| **Plan artifact** | \`${{ inputs.saved_plan_artifact_name }}\` |"
            echo "| **Plan artifact ID** | \`${{ inputs.saved_plan_artifact_id != '' && inputs.saved_plan_artifact_id || 'name fallback' }}\` |"
            echo "| **Plan metadata present** | \`${{ steps.plan_meta.outputs.metadata_present }}\` |"
            echo "| **Plan state version** | \`${{ steps.plan_meta.outputs.plan_state_version }}\` |"
            echo "| **Saved plan stale** | \`${{ steps.plan_freshness.outputs.stale }}\` |"
            echo "| **Tainted resources in plan** | \`${{ steps.taint_check.outputs.has_tainted }}\` — ${{ steps.taint_check.outputs.tainted_list != '' && steps.taint_check.outputs.tainted_list || 'none' }} |"
            echo "| **Pre-apply drift check** | exit code ${{ steps.drift.outputs.drift_exit }} |"
            echo "| **Pre-apply state version** | \`${{ steps.state_version.outputs.version_id }}\` |"
            echo "| **Triggered by** | @${{ github.actor }} |"
            echo "| **Commit** | [\`${GITHUB_SHA::8}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}) |"
            echo "| **Run** | [#${{ github.run_number }}](${RUN_URL}) |"
            echo "| **Status** | ${{ job.status }} |"
            echo ""
            echo "### Rollback (if required)"
            echo "1. Identify the pre-apply state version from the table above."
            echo "2. Restore it in S3:"
            echo "   aws s3api copy-object --bucket ${{ secrets.TERRAFORM_STATE_BUCKET }} --copy-source ${{ secrets.TERRAFORM_STATE_BUCKET }}/${TF_ENV}/terraform.tfstate?versionId=${{ steps.state_version.outputs.version_id }} --key ${TF_ENV}/terraform.tfstate"
            echo "3. Re-run plan and apply to reconcile infrastructure safely."
          } >> "$GITHUB_STEP_SUMMARY"